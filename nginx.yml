- name: Deploy Nginx Reverse Proxy
  hosts: nginx
  become: yes

  vars:
    flask_host: "{{ hostvars[groups['flask'][0]].ansible_host | default(groups['flask'][0]) }}"

  tasks:

    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create nginx reverse proxy config
      copy:
        dest: /etc/nginx/sites-available/flaskapp
        content: |
          server {
              listen 80;

              location / {
                  proxy_pass http://{{ flask_host }}:5000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Enable site
      file:
        src: /etc/nginx/sites-available/flaskapp
        dest: /etc/nginx/sites-enabled/flaskapp
        state: link
        force: yes

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes
